version: '3.8'

services:

  mongo:
    image: mongo:6
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  data-generator-service:
    build:
      context: ./data-generator-service
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://mongo:27017/synthetic_data
    depends_on:
      - mongo
    volumes:
      - ./data-generator-service:/app

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  celery-worker:
    build:
      context: ./data-generator-service
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      - redis
      - data-generator-service
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./data-generator-service:/app

volumes:
  mongo-data:
