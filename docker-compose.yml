version: '3.8'

services:
  # API Gateway (ex. Spring Cloud Gateway)
  api-gateway:
    container_name: api-gateway
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
    networks:
      - backend
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8081

  # Gemensam MongoDB för alla tjänster
  mongo:
    image: mongo:6
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - backend

  # Auth-service (t.ex. Spring Boot)
  auth-service:
    container_name: auth-service
    build:
      context: ./auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/authdb
    depends_on:
      - mongo
    networks:
      - backend

  # Adminportal (React + Vite)
  adminportal:
    container_name: adminportal
    build:
      context: ./adminportal
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    networks:
      - backend

volumes:
  mongo-data:

networks:
  backend:
    driver: bridge
